version: '3.8'

services:
  # MQTT 브로커 (우체국)
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    
  # 가상 센서 데이터 생성기 추가
  mock-sensor:
    image: python:3.10-slim
    container_name: mock-sensor
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "pip install paho-mqtt && python mock_sensor.py"
    depends_on:
      - mosquitto
    environment:
      - MQTT_HOST=mosquitto

  # FastAPI 서버 (관제 센터)
  backend:
    build: .
    container_name: monitoring-api
    ports:
      - "8000:8000"
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER_HOST=mosquitto